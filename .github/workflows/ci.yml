name: CI — Portfolio Quality Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  # ─── RUN TESTS ──────────────────────────────────────────────────────
  test:
    name: Run Portfolio Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests
        run: node tests/portfolio.test.js

  # ─── HTML VALIDATION (non-blocking warning only) ─────────────────────
  validate-html:
    name: Validate HTML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-package-lock

      - name: Validate HTML (warnings only — non-blocking)
        run: npm run lint:html || echo "::warning::HTML validation issues found — see above"
        continue-on-error: true

  # ─── LINK CHECK ─────────────────────────────────────────────────────
  check-links:
    name: Check for Broken Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check links in HTML
        uses: lycheeverse/lychee-action@v1
        with:
          args: >
            --verbose
            --no-progress
            --exclude-loopback
            --exclude "localhost"
            --exclude "127.0.0.1"
            --max-retries 3
            index.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ─── FILE SIZE CHECK ─────────────────────────────────────────────────
  size-check:
    name: File Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check index.html size (warn if > 500KB)
        run: |
          SIZE=$(wc -c < index.html)
          echo "index.html size: ${SIZE} bytes"
          if [ $SIZE -gt 512000 ]; then
            echo "::warning::index.html is over 500KB — consider optimizing"
          else
            echo "✓ File size is within acceptable limits"
          fi

  # ─── DEPLOY TO GITHUB PAGES ──────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: [test]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
